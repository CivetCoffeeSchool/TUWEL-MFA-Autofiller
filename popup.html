<!DOCTYPE html>
<html>
<body style="padding:12px;width:220px;font-family:sans-serif">
  <p style="margin:0 0 8px;font-size:13px">TOTP Secret (base32)</p>
  <input id="secret" type="password" placeholder="e.g. JBSWY3DPEHPK3PXP"
         style="width:100%;box-sizing:border-box;padding:6px;font-size:13px"/>
  <button id="save" style="margin-top:8px;width:100%;padding:6px">Save</button>
  <p id="msg" style="font-size:12px;color:green;margin:6px 0 0"></p>
  <script src="popup.js"></script>
</body>
</html>
